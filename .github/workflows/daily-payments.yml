name: Daily Payment Processing

on:
  # Run daily at 06:00 UTC (1am EST / 10pm PST)
  schedule:
    - cron: '0 6 * * *'

  # Allow manual trigger for testing
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (show orders without processing)'
        required: false
        default: 'false'
        type: boolean

jobs:
  process-payments:
    runs-on: ubuntu-latest

    steps:
      - name: Process Due Order Payments
        env:
          APP_URL: ${{ secrets.SHOPIFY_APP_URL }}
          APP_SECRET: ${{ secrets.APP_SECRET }}
        run: |
          echo "Processing due order payments at $(date -u)"

          # If dry run, use GET to see status without processing
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "DRY RUN - Checking orders without processing"
            response=$(curl -s -w "\n%{http_code}" \
              "${APP_URL}/api/cron/payments?secret=${APP_SECRET}")
          else
            response=$(curl -s -w "\n%{http_code}" -X POST \
              "${APP_URL}/api/cron/payments" \
              -H "Content-Type: application/json" \
              -H "x-app-secret: ${APP_SECRET}")
          fi

          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')

          echo "Response code: $http_code"
          echo "Response body:"
          echo "$body" | jq . 2>/dev/null || echo "$body"

          if [ "$http_code" != "200" ]; then
            echo "Payment processing failed with status $http_code"
            exit 1
          fi

          # Extract summary from response
          if [ "${{ github.event.inputs.dry_run }}" != "true" ]; then
            processed=$(echo "$body" | jq -r '.processed // 0')
            successful=$(echo "$body" | jq -r '.successful // 0')
            charged=$(echo "$body" | jq -r '.charged // 0')
            invoiced=$(echo "$body" | jq -r '.invoiced // 0')

            echo ""
            echo "=== Payment Processing Summary ==="
            echo "Orders processed: $processed"
            echo "Successful: $successful"
            echo "  - Cards charged: $charged"
            echo "  - Invoices sent: $invoiced"
            echo "================================="
          fi

          echo "Payment processing completed successfully"

      - name: Notify on Failure
        if: failure()
        run: |
          echo "Daily payment processing failed! Check the logs above for details."
          # Add Slack/email notification here if needed
