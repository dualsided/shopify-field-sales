name: Daily Usage Billing

on:
  # Run daily at 00:05 UTC
  schedule:
    - cron: '5 0 * * *'

  # Allow manual trigger for testing
  workflow_dispatch:

jobs:
  report-usage:
    runs-on: ubuntu-latest

    steps:
      - name: Report Daily Usage to Shopify
        env:
          APP_URL: ${{ secrets.SHOPIFY_APP_URL }}
          APP_SECRET: ${{ secrets.APP_SECRET }}
        run: |
          echo "Reporting daily usage at $(date -u)"

          response=$(curl -s -w "\n%{http_code}" -X POST \
            "${APP_URL}/api/cron/billing" \
            -H "Content-Type: application/json" \
            -H "x-app-secret: ${APP_SECRET}")

          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')

          echo "Response code: $http_code"
          echo "Response body:"
          echo "$body" | jq '.' 2>/dev/null || echo "$body"

          if [ "$http_code" != "200" ]; then
            echo "Daily billing failed with status $http_code"
            exit 1
          fi

          # Extract summary for logging
          echo ""
          echo "=== Summary ==="
          echo "$body" | jq -r '.summary | "Shops: \(.shopsProcessed) | Success: \(.successful) | Errors: \(.errors) | Total: $\(.totalChargesCents / 100)"' 2>/dev/null || true

          echo "Daily billing completed successfully"

      - name: Notify on Failure
        if: failure()
        run: |
          echo "Daily billing failed! Check the logs above for details."
          # Add Slack/email notification here if needed
