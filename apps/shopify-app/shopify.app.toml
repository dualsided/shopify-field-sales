# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "6ace764e1521a6d126490f8dcdfd74c2"
name = "Field Sales Manager"
application_url = "https://example.com"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-01"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = [ "companies/create", "companies/update", "companies/delete" ]
  uri = "/webhooks/companies"

  [[webhooks.subscriptions]]
  topics = [ "company_locations/create", "company_locations/update", "company_locations/delete" ]
  uri = "/webhooks/company-locations"

  [[webhooks.subscriptions]]
  topics = [ "products/create", "products/update", "products/delete" ]
  uri = "/webhooks/products"

  # Note: Order webhooks require protected customer data access approval
  # See: https://shopify.dev/docs/apps/launch/protected-customer-data
  # For now, order sync will be done via polling or manual sync
  # Uncomment after approval:
  # [[webhooks.subscriptions]]
  # topics = [ "orders/create", "orders/updated", "orders/paid", "orders/fulfilled", "orders/cancelled" ]
  # uri = "/webhooks/orders"

[access_scopes]
scopes = "read_customers,read_companies,write_companies,read_orders,write_draft_orders,read_products"

[auth]
redirect_urls = [ "https://example.com/api/auth" ]
